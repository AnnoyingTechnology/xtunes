# cargo-deny configuration.
# Run with: cargo deny --all-features check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
# Sustain is GPL-3.0-or-later. Inbound dependency licenses must be
# compatible with that. The list below is the standard "GPL-3 friendly"
# set: permissive licences, MPL-2.0 weak copyleft, and same-or-stronger
# copyleft (LGPL, GPL-3, AGPL-3).
#
# Notably excluded as inbound:
#   - GPL-2.0 only (no upgrade clause) -- incompatible with GPL-3
#   - OpenSSL <3.0                     -- incompatible without exception
#   - CDDL, EPL                        -- incompatible
allow = [
    "0BSD",
    "AGPL-3.0",
    "AGPL-3.0-or-later",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "GPL-2.0-or-later",
    "GPL-3.0",
    "GPL-3.0-or-later",
    "ISC",
    "LGPL-2.1",
    "LGPL-2.1-or-later",
    "LGPL-3.0",
    "LGPL-3.0-or-later",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
