name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: Tag or ref to build (e.g. v0.1.0)
        required: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deb:
    name: Build .deb (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb

      - name: Build release .deb
        run: cargo deb -p sustain-app --locked

      - name: Locate artifact
        id: artifact
        run: |
          DEB=$(ls target/debian/*.deb | head -n1)
          echo "path=${DEB}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${DEB}")" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (workflow)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.artifact.outputs.path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
