name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Build jobs run inside debian:trixie-slim because the workspace requires
  # GTK >= 4.18 (Cargo.toml: `features = ["v4_18"]`). Ubuntu 24.04 ships
  # GTK 4.14; Debian trixie ships 4.18. This also matches the project's
  # Debian-first target platform.
  clippy:
    name: clippy
    runs-on: ubuntu-24.04
    container:
      image: debian:trixie-slim
    steps:
      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git build-essential pkg-config \
            libgtk-4-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-24.04
    container:
      image: debian:trixie-slim
    steps:
      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git build-essential pkg-config \
            libgtk-4-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            xvfb
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: xvfb-run -a cargo test --workspace --locked --no-fail-fast

  doc:
    name: rustdoc
    runs-on: ubuntu-24.04
    container:
      image: debian:trixie-slim
    steps:
      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git build-essential pkg-config \
            libgtk-4-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --locked --no-deps --document-private-items

  deny:
    name: cargo-deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny --all-features check

  machete:
    name: cargo-machete
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  typos:
    name: typos
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1
